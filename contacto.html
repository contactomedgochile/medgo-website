<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Contacto | MedGO – Health Compliance & Learning</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>

  <script>
    tailwind.config={
      theme:{
        extend:{
          colors:{
            primary:"#0f2a43",
            backgroundLight:"#f6f7f8"
          },
          fontFamily:{
            display:["Inter","sans-serif"]
          }
        }
      }
    }
  </script>

  <style>
    body{font-family:Inter,sans-serif;}
  </style>
</head>

<body class="bg-backgroundLight text-primary font-display">

<header class="bg-white shadow-sm border-b">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
    <img src="/assets/logo-medgo.svg" class="h-10">
    <a href="index.html" class="text-sm font-medium hover:opacity-70">Inicio</a>
  </div>
</header>

<main class="py-16">
  <div class="max-w-3xl mx-auto px-6">

    <h1 class="text-3xl font-bold mb-6">Contacto</h1>

    <form id="contactForm" class="space-y-6 bg-white p-8 rounded-xl shadow">

      <input name="nombre" type="text" placeholder="Nombre completo"
        required pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]{3,60}"
        title="Solo letras y espacios (mínimo 3 caracteres)"
        class="w-full border rounded-lg p-3"/>

      <input name="correo" type="email" placeholder="Correo electrónico"
        required
        class="w-full border rounded-lg p-3"/>

      <input name="telefono" type="text" placeholder="+569XXXXXXXX"
        required pattern="\+569\d{8}"
        title="Formato obligatorio +569XXXXXXXX"
        class="w-full border rounded-lg p-3"/>

      <input name="empresa" type="text" placeholder="Empresa (opcional)"
        class="w-full border rounded-lg p-3"/>

      <select name="servicio" required
        class="w-full border rounded-lg p-3">
        <option value="">Seleccione servicio</option>
        <option value="Acreditación">Acreditación</option>
        <option value="Cumplimiento sanitario">Cumplimiento sanitario</option>
        <option value="Capacitación">Capacitación</option>
        <option value="Asesoría técnica">Asesoría técnica</option>
      </select>

      <textarea name="mensaje" rows="4"
        placeholder="Describe tu necesidad (mínimo 10 caracteres)"
        required minlength="10"
        class="w-full border rounded-lg p-3"></textarea>

      <button type="submit"
        class="bg-primary text-white px-6 py-3 rounded-lg font-bold hover:opacity-90 transition">
        Enviar solicitud
      </button>

      <p id="formStatus" class="text-sm mt-2 hidden"></p>

    </form>

  </div>
</main>

<footer class="bg-primary text-white py-6 mt-20">
  <div class="max-w-6xl mx-auto px-6 text-sm text-center">
    © <span id="year"></span> MedGO. Todos los derechos reservados.
  </div>
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

document.addEventListener("DOMContentLoaded", function() {

  const form = document.getElementById("contactForm");
  const formStatus = document.getElementById("formStatus");

  form.addEventListener("submit", function(e) {

    e.preventDefault();

    const formData = new FormData(form);

    formStatus.classList.remove("hidden","text-red-600","text-green-600");
    formStatus.textContent = "Enviando solicitud...";

    fetch("https://script.google.com/macros/s/AKfycbxZCQXIDSYu91ltsoKzNx63PsCzjO8wkPratkw9Pm_YmwZxG0mF_Y28S6lXgPERwpKLSw/exec", {
      method: "POST",
      body: formData
    })
    .then(response => response.json())
    .then(result => {

      if (result.status === "success") {
        formStatus.classList.add("text-green-600");
        formStatus.textContent = "Solicitud enviada correctamente.";
        form.reset();
      } else {
        formStatus.classList.add("text-red-600");
        formStatus.textContent = result.message || "Error en el envío.";
      }

    })
    .catch(error => {
      formStatus.classList.add("text-red-600");
      formStatus.textContent = "Error de conexión con el servidor.";
      console.error(error);
    });

  });

});
</script>

</body>
</html>
