<form id="contactForm" class="space-y-6">

  <input name="nombre" type="text" placeholder="Nombre completo"
    required pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]{3,60}"
    title="Solo letras y espacios (mínimo 3 caracteres)"
    class="w-full border rounded-lg p-3" />

  <input name="correo" type="email" placeholder="Correo electrónico"
    required
    class="w-full border rounded-lg p-3" />

  <input name="telefono" type="text" placeholder="+569XXXXXXXX"
    required pattern="\+569\d{8}"
    title="Debe tener formato +569XXXXXXXX"
    class="w-full border rounded-lg p-3" />

  <input name="empresa" type="text" placeholder="Empresa (opcional)"
    class="w-full border rounded-lg p-3" />

  <select name="servicio" required
    class="w-full border rounded-lg p-3">
    <option value="">Seleccione servicio</option>
    <option value="Acreditación">Acreditación</option>
    <option value="Cumplimiento sanitario">Cumplimiento sanitario</option>
    <option value="Capacitación">Capacitación</option>
    <option value="Asesoría técnica">Asesoría técnica</option>
  </select>

  <textarea name="mensaje" rows="4"
    placeholder="Describe tu necesidad (mínimo 10 caracteres)"
    required minlength="10"
    class="w-full border rounded-lg p-3"></textarea>

  <button type="submit"
    class="bg-primary text-white px-6 py-3 rounded-lg font-bold">
    Enviar solicitud
  </button>

  <p id="formStatus" class="hidden text-sm mt-2"></p>

</form>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {

  e.preventDefault();
  const formStatus = document.getElementById("formStatus");
  const formData = new FormData(this);

  fetch("https://script.google.com/macros/s/AKfycbwxRHIq-_3ZBlb9oVXkTC56pwMBY9dFW-QxF32zElami9ST4R8TZljnS51ME89Cufdfng/exec", {
    method: "POST",
    body: formData
  })
  .then(response => response.json())
  .then(result => {

    formStatus.classList.remove("hidden");

    if (result.status === "success") {

      formStatus.classList.remove("text-red-600");
      formStatus.classList.add("text-green-600");
      formStatus.textContent = "Solicitud enviada correctamente.";
      this.reset();

    } else {

      formStatus.classList.remove("text-green-600");
      formStatus.classList.add("text-red-600");
      formStatus.textContent = result.message;

    }

  })
  .catch(error => {

    formStatus.classList.remove("hidden");
    formStatus.classList.add("text-red-600");
    formStatus.textContent = "Error de conexión con el servidor.";

  });

});
</script>
